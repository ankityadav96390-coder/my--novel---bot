packages:
  "framer-motion": "For page transitions and fluid micro-interactions"
  "react-markdown": "To render formatted markdown in AI chat responses"
  "remark-gfm": "To support github flavored markdown like tables and lists in responses"
  "date-fns": "For formatting human-readable relative timestamps"
  "clsx": "For merging conditional Tailwind classes gracefully"
  "tailwind-merge": "To resolve Tailwind class conflicts"

